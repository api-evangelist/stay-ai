  humanURL: https://docs.stay.ai/reference/query-selling-plan-groups
  baseURL: https://api.retextion.com/api/v2/selling-plan-groups
  properties:
  - url: https://docs.stay.ai/reference/query-selling-plan-groups
    type: APIReference
  - url: openapi/stay-ai-openapi.yml
    type: OpenAPI
  - url: collections/stay-ai.postman_collection.json
    type: PostmanCollection
  description: List selling plan groups, retrieve a group by ID, and create or
