aid: stay-ai
url: https://raw.githubusercontent.com/api-evangelist/stay-ai/refs/heads/main/apis.yml
name: Stay AI
kind: company
description: Stay AI (formerly Retextion) is a subscription retention and growth
  platform for Shopify direct-to-consumer brands. It pairs a no-code customer
  portal with an ExperienceEngine for personalized promotions and upsells and a
  RetentionEngine for AI-driven churn prevention. Stay AI exposes a documented
  public REST API (base https://api.retextion.com/api/v2) authenticated with an
  X-RETEXTION-ACCESS-TOKEN header, covering subscriptions, recurring orders,
  selling plan groups, product catalog, the customer portal, account settings,
  bulk data export, and JWT-signed outbound webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Subscriptions
- Retention
- Churn
- Shopify
- Ecommerce
- DTC
created: '2026-07-10'
modified: '2026-07-10'
specificationVersion: '0.19'
apis:
- aid: stay-ai:stay-ai-subscriptions-api
  name: Stay AI Subscriptions API
  tags:
  - Subscriptions
  - Subscribers
  - Retention
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stay.ai/reference/query-all-subscriptions
  baseURL: https://api.retextion.com/api/v2/subscriptions
  properties:
  - url: https://docs.stay.ai/reference/query-all-subscriptions
    type: APIReference
  - url: https://docs.stay.ai/recipes/authenticate-open-api
    type: Documentation
  - url: openapi/stay-ai-openapi.yml
    type: OpenAPI
  - url: collections/stay-ai.postman_collection.json
    type: PostmanCollection
  description: Query subscriptions by customer email, status (ACTIVE, PAUSED,
    CANCELLED), and created date, retrieve a subscription by ID, and manage the
    subscription lifecycle - cancel, change frequency, update and remove line
    items, set the shipping address, add order notes, and attach metadata.
- aid: stay-ai:stay-ai-subscription-orders-api
  name: Stay AI Subscription Orders API
  tags:
  - Orders
  - Recurring Orders
  - Billing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.stay.ai/reference/query-orders
  baseURL: https://api.retextion.com/api/v2
  properties:
  - url: https://docs.stay.ai/reference/query-orders
    type: APIReference
  - url: openapi/stay-ai-openapi.yml
    type: OpenAPI
  - url: collections/stay-ai.postman_collection.json
    type: PostmanCollection
  description: Query recurring subscription orders by created and updated date
    windows, and trigger a new recurring charge for a single subscription
    ("order now"). Supports building order history and revenue reporting on top
    of a merchant's subscription program.
- aid: stay-ai:stay-ai-selling-plans-api
  name: Stay AI Selling Plans API
