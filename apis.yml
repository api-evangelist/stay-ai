  baseURL: https://api.retextion.com/api/v2/webhooks
  properties:
  - url: https://docs.stay.ai/reference/create-webhook-subscription
    type: APIReference
  - url: https://docs.stay.ai/reference/webhook-verification
    type: Documentation
  - url: openapi/stay-ai-openapi.yml
    type: OpenAPI
  - url: collections/stay-ai.postman_collection.json
    type: PostmanCollection
  description: Manage webhook subscriptions - list, create, and delete outbound
    webhooks for events such as SUBSCRIPTION, FAILED_PAYMENT, and
    SUCCESSFUL_PAYMENT. Outbound webhook requests are signed with a JWT in the
    x-retextion-webhook-token header for verification.
